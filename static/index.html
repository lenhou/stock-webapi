<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>股票趨勢分析 APP</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .result-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .sentiment-badge { font-weight: bold; padding: 5px 10px; border-radius: 4px; color: white; }
        textarea { width: 100%; height: 150px; margin-top: 10px; }
        .btn-copy { background-color: #007bff; color: white; border: none; padding: 8px 16px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>股票趨勢分析</h1>
    <input type="text" id="stockSymbol" placeholder="例如: 2330 或 00981A">
    <button onclick="queryStock()">查詢走勢</button>

    <div id="resultArea" class="result-box" style="display:none;">
        <h3>股票代碼：<span id="displaySymbol"></span></h3>
        <p>目前價格：<span id="displayPrice"></span></p>
        <p>目前走勢：<span id="displaySentiment" class="sentiment-badge"></span></p>
        
        <h4>近期數據匯出：</h4>
        <textarea id="copyTextbox" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">複製數據內容</button>
    </div>

    <script>
        async function queryStock() {
            const symbol = document.getElementById('stockSymbol').value;
            const res = await fetch(`/api/stock/${symbol}`);
            const data = await res.json();

            if (data.error) {
                alert(data.error);
                return;
            }

            // 顯示結果與顏色 
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('displaySymbol').innerText = data.symbol;
            document.getElementById('displayPrice').innerText = data.current_price;
            
            const sentimentEl = document.getElementById('displaySentiment');
            sentimentEl.innerText = data.sentiment;
            sentimentEl.style.backgroundColor = data.sentiment_color;

            // 格式化純文字到 Textbox [cite: 14]
            let rawText = "日期\t收盤價\n";
            data.history.forEach(item => {
                rawText += `${item.date}\t${item.close}\n`;
            });
            document.getElementById('copyTextbox').value = rawText;
        }

        function copyToClipboard() {
            const textBox = document.getElementById('copyTextbox');
            textBox.select();
            textBox.setSelectionRange(0, 99999); // 相容手機 [cite: 14]
            document.execCommand("copy");
            alert("已複製到剪貼簿！");
        }
    </script>
</body>
</html>
